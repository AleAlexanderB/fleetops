server {
  listen 80;
  server_name _;

  # ─── Home → Hub (Dashboard con sección "Sistemas del ecosistema")
  location = / {
    return 302 http://$host:3200/;
  }

  # ─── Shortcuts por nombre
  location ~ ^/hub/?$ {
    return 302 http://$host:3200/;
  }
  location ~ ^/fleetops/?$ {
    return 302 http://$host:8077/;
  }
  location ~ ^/equipos/?$ {
    return 302 http://$host:8078/;
  }

  # ─── Fallback general: cualquier otra ruta → Hub
  location / {
    return 302 http://$host:3200/;
  }
}
