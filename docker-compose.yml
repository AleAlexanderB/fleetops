# ══════════════════════════════════════════════════════════════════
# FleetOPS — docker-compose.yml (monorepo)
# AB Construcciones · Hyper-V / Windows Server 2019
#
# Uso inicial:
#   1. cp .env.example .env  →  completar credenciales RedGPS + IP
#   2. docker compose build
#   3. docker compose up -d
#
# Acceso: http://IP_SERVIDOR:8077
# ══════════════════════════════════════════════════════════════════

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8077}
        VITE_API_KEY: ${API_KEY:-}
    image: fleetops:latest
    container_name: fleetops_app
    ports:
      - "8077:8077"
    env_file: .env
    volumes:
      # divisiones.json persiste entre reinicios
      - fleetops_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8077/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: mysql:8.0
    container_name: fleetops_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-fleetops_root_2024}
      MYSQL_DATABASE:      fleetops
      MYSQL_USER:          ${DB_USER:-fleetops}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-fleetops_2024}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${DB_ROOT_PASSWORD:-fleetops_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  fleetops_data:
    driver: local
