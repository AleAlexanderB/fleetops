# ══════════════════════════════════════════════════════════════════
# FleetOPS — docker-compose.yml
# AB Construcciones · DigitalOcean VPS
#
# Prerequisitos:
#   1. Red compartida del ecosistema (crear una vez):
#        docker network create ab-ecosystem
#   2. Integration Gateway corriendo primero (en /opt/integration-gateway)
#
# Uso:
#   docker compose up -d
#
# Acceso:
#   - FleetOPS:  http://IP_SERVIDOR:8077
#   - Activos:   http://IP_SERVIDOR:8078
#   - Hub:       http://IP_SERVIDOR:80
# ══════════════════════════════════════════════════════════════════

services:

  # ── Hub principal (landing page + reverse proxy) ──────────────────
  hub:
    image: nginx:alpine
    container_name: fleetops_hub
    ports:
      - "80:80"
    volumes:
      - ./landing/html:/usr/share/nginx/html:ro
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8077}
        VITE_API_KEY: ${API_KEY:-}
    image: fleetops:latest
    container_name: fleetops_app
    ports:
      - "8077:8077"
    env_file: .env
    environment:
      GATEWAY_URL: ${GATEWAY_URL:-http://integration-gateway:3100}
      # Sync inter-servicios — consume catalogos desde Hub y asignaciones desde Equipos
      INTERNAL_SYNC_KEY: ${INTERNAL_SYNC_KEY:-}
      HUB_URL: ${HUB_URL:-http://ab_hub:3200}
      EQUIPOS_URL: ${EQUIPOS_URL:-http://equipos_app:8078}
    volumes:
      # divisiones.json persiste entre reinicios
      - fleetops_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - ab-ecosystem
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8077/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: mysql:8.0
    container_name: fleetops_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-fleetops_root_2024}
      MYSQL_DATABASE:      fleetops
      MYSQL_USER:          ${DB_USER:-fleetops}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-fleetops_2024}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${DB_ROOT_PASSWORD:-fleetops_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped


  equipos:
    build:
      context: ./equipos
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${EQUIPOS_VITE_API_URL:-}
    image: equipos:latest
    container_name: equipos_app
    ports:
      - "8078:8078"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8078
      DATABASE_URL: mysql://${EQUIPOS_DB_USER:-equipos_user}:${EQUIPOS_DB_PASSWORD:-equipos_2024}@fleetops_db:3306/${EQUIPOS_DB_NAME:-activos}
      JWT_SECRET: ${EQUIPOS_JWT_SECRET:-${JWT_SECRET:-fleetops_jwt_change_me}}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      GATEWAY_URL: http://integration-gateway:3100
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
      FLEETOPS_URL: http://fleetops_app:8077
      FLEETOPS_API_KEY: ${API_KEY:-}
      CINTELINK_URL: ${CINTELINK_URL:-https://cintelink.com/api/v2}
      CINTELINK_TOKEN: ${CINTELINK_TOKEN:-}
      # Hub AB SSO (2026-04-23)
      HUB_JWT_SECRET: ${HUB_JWT_SECRET:-}
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:-}
      # Sync inter-servicios — misma key compartida con Hub y FleetOps
      INTERNAL_SYNC_KEY: ${INTERNAL_SYNC_KEY:-}
    volumes:
      - equipos_uploads:/app/uploads
    networks:
      - default
      - ab-ecosystem
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8078/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ab-ecosystem:
    external: true

volumes:
  equipos_uploads:
    driver: local
  mysql_data:
    driver: local
  fleetops_data:
    driver: local
